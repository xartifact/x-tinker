name: CI / CD

on:
  push:
    branches:
      - main
      - feat/**
      - fix/**
      - ci/**
    tags:
      - "v*"
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

  publish-sdk:
    needs: check
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') || github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run --filter './packages/*' build

      - name: Configure bun for GitHub Packages
        run: |
          echo "@xartifact:registry=https://npm.pkg.github.com" > .npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> .npmrc

      - name: Set prerelease version
        if: github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/v')
        run: |
          SHA=$(git rev-parse --short HEAD)
          VER=$(jq -r '.version' packages/shared/package.json)
          (cd packages/shared && bun pm version "$VER-ci.$SHA" --no-git-tag-version)
          (cd packages/sdk && bun pm version "$VER-ci.$SHA" --no-git-tag-version)

      - name: Replace workspace:* with published version (workaround for oven-sh/bun#20477)
        run: |
          VER=$(jq -r '.version' packages/shared/package.json)
          sed -i "s/workspace:\*/$VER/g" packages/sdk/package.json

      - name: Publish @xartifact/x-tinker-shared
        run: bun publish --tag ${{ github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/v') && 'next' || 'latest' }}
        working-directory: packages/shared

      - name: Publish @xartifact/x-tinker-sdk
        run: bun publish --tag ${{ github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/v') && 'next' || 'latest' }}
        working-directory: packages/sdk

      - name: Restore workspace deps
        if: always()
        run: bun install

  docker:
    needs: check
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max